<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI教育平台</title>
    <!-- Tailwind CSS + daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* 自定义背景渐变 */
        .auth-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 卡片玻璃效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Tab 激活状态 */
        .tab-active {
            border-bottom: 3px solid #667eea;
            color: #667eea;
            font-weight: 600;
        }

        /* 输入框图标 */
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .input-with-icon {
            padding-left: 40px;
        }
    </style>
</head>
<body class="auth-bg" x-data="authApp()">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card rounded-2xl shadow-2xl w-full max-w-md p-8">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">
                    <span class="text-primary">AI</span> 教育平台
                </h1>
                <p class="text-gray-500 mt-2">智能学习，精准提升</p>
            </div>

            <!-- Tab 切换 -->
            <div class="flex border-b border-gray-200 mb-6">
                <button
                    class="flex-1 py-3 text-center transition-colors"
                    :class="activeTab === 'login' ? 'tab-active' : 'text-gray-500 hover:text-gray-700'"
                    @click="activeTab = 'login'">
                    登录
                </button>
                <button
                    class="flex-1 py-3 text-center transition-colors"
                    :class="activeTab === 'register' ? 'tab-active' : 'text-gray-500 hover:text-gray-700'"
                    @click="activeTab = 'register'">
                    注册
                </button>
            </div>

            <!-- 登录表单 -->
            <form x-show="activeTab === 'login'" @submit.prevent="handleLogin" class="space-y-4">
                <!-- 用户名/手机号 -->
                <div class="form-control relative">
                    <label class="label">
                        <span class="label-text font-medium">手机号/用户名</span>
                    </label>
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input
                        type="text"
                        x-model="loginForm.identifier"
                        placeholder="请输入手机号或用户名"
                        class="input input-bordered w-full input-with-icon"
                        :class="loginForm.errors.identifier ? 'input-error' : ''"
                        required />
                    <label class="label" x-show="loginForm.errors.identifier">
                        <span class="label-text-alt text-error" x-text="loginForm.errors.identifier"></span>
                    </label>
                </div>

                <!-- 密码 -->
                <div class="form-control relative">
                    <label class="label">
                        <span class="label-text font-medium">密码</span>
                    </label>
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input
                        :type="showPassword ? 'text' : 'password'"
                        x-model="loginForm.password"
                        placeholder="请输入密码"
                        class="input input-bordered w-full input-with-icon pr-10"
                        :class="loginForm.errors.password ? 'input-error' : ''"
                        required />
                    <button
                        type="button"
                        class="absolute right-3 top-9 text-gray-400 hover:text-gray-600"
                        @click="showPassword = !showPassword">
                        <svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg x-show="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                        </svg>
                    </button>
                </div>

                <!-- 登录按钮 -->
                <button
                    type="submit"
                    class="btn btn-primary w-full text-white"
                    :class="loading ? 'loading' : ''"
                    :disabled="loading">
                    <span x-show="!loading">登 录</span>
                </button>

                <!-- 演示快捷登录 -->
                <div class="divider">演示快捷登录</div>
                <div class="grid grid-cols-3 gap-3">
                    <button
                        type="button"
                        class="btn btn-success btn-outline"
                        @click="handleDemoLogin('STUDENT')">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        学生
                    </button>
                    <button
                        type="button"
                        class="btn btn-primary btn-outline"
                        @click="handleDemoLogin('TEACHER')">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                        </svg>
                        老师
                    </button>
                    <button
                        type="button"
                        class="btn btn-warning btn-outline"
                        @click="handleDemoLogin('PARENT')">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        家长
                    </button>
                </div>
            </form>

            <!-- 注册表单 -->
            <form x-show="activeTab === 'register'" @submit.prevent="handleRegister" class="space-y-4">
                <!-- 手机号 -->
                <div class="form-control relative">
                    <label class="label">
                        <span class="label-text font-medium">手机号</span>
                    </label>
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </span>
                    <input
                        type="tel"
                        x-model="registerForm.phone"
                        placeholder="请输入手机号"
                        class="input input-bordered w-full input-with-icon"
                        :class="registerForm.errors.phone ? 'input-error' : ''"
                        required />
                </div>

                <!-- 验证码 -->
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">验证码</span>
                    </label>
                    <div class="flex gap-2">
                        <input
                            type="text"
                            x-model="registerForm.code"
                            placeholder="请输入验证码"
                            class="input input-bordered flex-1"
                            maxlength="6"
                            required />
                        <button
                            type="button"
                            class="btn btn-outline btn-primary"
                            :disabled="countdown > 0 || !registerForm.phone"
                            @click="sendCode"
                            x-text="countdown > 0 ? countdown + 's 后重发' : '获取验证码'">
                        </button>
                    </div>
                </div>

                <!-- 设置密码 -->
                <div class="form-control relative">
                    <label class="label">
                        <span class="label-text font-medium">设置密码</span>
                    </label>
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input
                        :type="showPassword ? 'text' : 'password'"
                        x-model="registerForm.password"
                        placeholder="请设置密码（6-20位）"
                        class="input input-bordered w-full input-with-icon pr-10"
                        :class="registerForm.errors.password ? 'input-error' : ''"
                        required />
                    <button
                        type="button"
                        class="absolute right-3 top-9 text-gray-400 hover:text-gray-600"
                        @click="showPassword = !showPassword">
                        <svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                <!-- 密码提示 -->
                <label class="label" x-show="registerForm.password">
                    <span class="label-text-alt" :class="registerForm.password.length >= 6 ? 'text-success' : 'text-warning'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        至少6个字符
                    </span>
                </label>

                <!-- 确认密码 -->
                <div class="form-control relative">
                    <label class="label">
                        <span class="label-text font-medium">确认密码</span>
                    </label>
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input
                        type="password"
                        x-model="registerForm.confirmPassword"
                        placeholder="请再次输入密码"
                        class="input input-bordered w-full input-with-icon"
                        :class="registerForm.errors.confirmPassword ? 'input-error' : ''"
                        required />
                    <label class="label" x-show="registerForm.confirmPassword && registerForm.password !== registerForm.confirmPassword">
                        <span class="label-text-alt text-error">两次密码不一致</span>
                    </label>
                </div>

                <!-- 注册按钮 -->
                <button
                    type="submit"
                    class="btn btn-primary w-full text-white"
                    :class="loading ? 'loading' : ''"
                    :disabled="loading || registerForm.password !== registerForm.confirmPassword">
                    <span x-show="!loading">注 册</span>
                </button>

                <!-- 已有账号提示 -->
                <p class="text-center text-gray-500 text-sm">
                    已有账号？
                    <a href="#" class="text-primary hover:underline" @click.prevent="activeTab = 'login'">点击登录</a>
                </p>
            </form>

            <!-- 消息提示 -->
            <div
                x-show="message.show"
                x-transition
                class="alert mt-4"
                :class="message.type === 'success' ? 'alert-success' : 'alert-error'">
                <span x-text="message.text"></span>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="text-center text-white/70 text-sm py-4">
        <p>&copy; 2024 AI 教育平台 - 智能学习，精准提升</p>
    </footer>

    <script>
        function authApp() {
            return {
                activeTab: 'login',
                showPassword: false,
                loading: false,
                countdown: 0,

                loginForm: {
                    identifier: '',
                    password: '',
                    errors: {}
                },

                registerForm: {
                    phone: '',
                    code: '',
                    password: '',
                    confirmPassword: '',
                    errors: {}
                },

                message: {
                    show: false,
                    type: 'success',
                    text: ''
                },

                showMessage(type, text) {
                    this.message.type = type;
                    this.message.text = text;
                    this.message.show = true;
                    setTimeout(() => {
                        this.message.show = false;
                    }, 3000);
                },

                async handleLogin() {
                    this.loading = true;
                    this.loginForm.errors = {};

                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.loginForm.identifier,
                                password: this.loginForm.password
                            })
                        });

                        const result = await response.json();

                        if (result.code === '00000') {
                            this.showMessage('success', '登录成功，正在跳转...');
                            // 根据角色跳转
                            setTimeout(() => {
                                const role = result.data.role;
                                if (role === 'STUDENT') {
                                    window.location.href = '/student';
                                } else if (role === 'TEACHER') {
                                    window.location.href = '/teacher';
                                } else if (role === 'PARENT') {
                                    window.location.href = '/parent';
                                } else {
                                    window.location.href = '/';
                                }
                            }, 1000);
                        } else {
                            this.showMessage('error', result.message || '登录失败');
                        }
                    } catch (error) {
                        this.showMessage('error', '网络错误，请稍后重试');
                    } finally {
                        this.loading = false;
                    }
                },

                async handleDemoLogin(role) {
                    this.loading = true;

                    try {
                        const response = await fetch('/api/auth/demo-login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ role: role })
                        });

                        const result = await response.json();

                        if (result.code === '00000') {
                            this.showMessage('success', '演示登录成功，正在跳转...');
                            setTimeout(() => {
                                if (role === 'STUDENT') {
                                    window.location.href = '/student';
                                } else if (role === 'TEACHER') {
                                    window.location.href = '/teacher';
                                } else if (role === 'PARENT') {
                                    window.location.href = '/parent';
                                }
                            }, 1000);
                        } else {
                            this.showMessage('error', result.message || '演示登录失败');
                        }
                    } catch (error) {
                        this.showMessage('error', '网络错误，请稍后重试');
                    } finally {
                        this.loading = false;
                    }
                },

                async sendCode() {
                    if (!this.registerForm.phone || this.registerForm.phone.length !== 11) {
                        this.showMessage('error', '请输入正确的手机号');
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/send-code', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: this.registerForm.phone })
                        });

                        const result = await response.json();

                        if (result.code === '00000') {
                            this.showMessage('success', '验证码已发送');
                            // 开始倒计时
                            this.countdown = 60;
                            const timer = setInterval(() => {
                                this.countdown--;
                                if (this.countdown <= 0) {
                                    clearInterval(timer);
                                }
                            }, 1000);
                        } else {
                            this.showMessage('error', result.message || '发送失败');
                        }
                    } catch (error) {
                        this.showMessage('error', '网络错误，请稍后重试');
                    }
                },

                async handleRegister() {
                    if (this.registerForm.password.length < 6) {
                        this.showMessage('error', '密码至少6位');
                        return;
                    }

                    if (this.registerForm.password !== this.registerForm.confirmPassword) {
                        this.showMessage('error', '两次密码不一致');
                        return;
                    }

                    this.loading = true;

                    try {
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: 'user_' + Date.now(),
                                password: this.registerForm.password,
                                realName: '新用户',
                                role: 'STUDENT'
                            })
                        });

                        const result = await response.json();

                        if (result.code === '00000') {
                            this.showMessage('success', '注册成功，请登录');
                            setTimeout(() => {
                                this.activeTab = 'login';
                            }, 1500);
                        } else {
                            this.showMessage('error', result.message || '注册失败');
                        }
                    } catch (error) {
                        this.showMessage('error', '网络错误，请稍后重试');
                    } finally {
                        this.loading = false;
                    }
                }
            };
        }
    </script>
</body>
</html>
